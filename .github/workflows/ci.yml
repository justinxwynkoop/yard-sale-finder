name: CI

# Quality gate on every PR into main. Typecheck + tests must pass to
# merge; lint runs informationally until the ESLint rules are flipped
# from `warn` to `error` (see docs/PIPELINE.md §6), at which point drop
# the `continue-on-error` below to make it a hard gate too.
on:
  pull_request:
    branches: [main]

# Cancel superseded runs on the same PR.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (tsc --noEmit)
        run: npm run typecheck

      - name: Tests (jest)
        run: npm test -- --ci

      - name: Lint (informational until rules are errors)
        run: npm run lint
        continue-on-error: true
