name: CI

# Quality gate on every PR into main. Typecheck, lint, and tests must all
# pass to merge. (Lint is a hard gate now that the config is ESLint-9 flat
# and the codebase is at 0 errors — see docs/PIPELINE.md §6.)
on:
  pull_request:
    branches: [main]

# Cancel superseded runs on the same PR.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (tsc --noEmit)
        run: npm run typecheck

      - name: Tests (jest)
        run: npm test -- --ci

      - name: Lint (eslint)
        run: npm run lint
